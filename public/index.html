<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#018367" />

    <title>BetterWix — Parsa Kazemi</title>
    <meta
      name="description"
      content="BetterWix — personal portfolio of Parsa Kazemi: data science, projects, designs, writings, photography and travels."
    />

    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Open Graph (link previews on LinkedIn, Telegram, Facebook, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="BetterWix" />
    <meta property="og:title" content="BetterWix — Parsa Kazemi" />
    <meta
      property="og:description"
      content="Data scientist, creator and designer. Projects, travels, writings and the journey from art to algorithms."
    />
    <meta property="og:url" content="https://wix-society.netlify.app/" />
    <meta property="og:image" content="https://wix-society.netlify.app/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="BetterWix — Parsa Kazemi" />
    <meta
      name="twitter:description"
      content="Data scientist, creator and designer. Projects, travels, writings and the journey from art to algorithms."
    />
    <meta name="twitter:image" content="https://wix-society.netlify.app/og-image.jpg" />

    <!-- react-slick styles -->
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.css"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick-theme.css"
    />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <!-- Netlify Forms detection (the interactive form is rendered by React) -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <textarea name="message"></textarea>
    </form>
    <div id="root"></div>
  </body>
</html>
